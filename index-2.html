<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do You Love Me? 🥺</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0, #fce4ec);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(233, 30, 99, 0.2);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #e91e63;
      margin-bottom: 1.2rem;
    }

    .gif-container {
      margin: 0 auto 1.5rem;
      width: 200px;
      height: 200px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(233,30,99,0.25);
    }

    .gif-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .counter {
      font-size: 0.9rem;
      color: #f48fb1;
      margin-bottom: 1.2rem;
      min-height: 1.2em;
      font-style: italic;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .btn-yes {
      background: #e91e63;
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(233,30,99,0.5);
    }

    .btn-no {
      background: white;
      color: #e91e63;
      border: 2px solid #e91e63;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      position: absolute;
      transition: font-size 0.2s;
      white-space: nowrap;
    }

    .success-msg {
      display: none;
      font-family: 'Pacifico', cursive;
      font-size: 1.4rem;
      color: #e91e63;
      margin-top: 1rem;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .music-note {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: noteFloat 2s ease-out forwards;
      z-index: 10;
    }

    @keyframes noteFloat {
      0%   { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx), -80px) rotate(var(--dr)); }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsContainer"></div>

  <div class="card">
    <h1>Do you love me? 🥺</h1>

    <div class="gif-container">
      <img src="https://media.giphy.com/media/FTGah7Mx3ss04PcasF/giphy.gif" alt="cute gif" />
    </div>

    <div class="counter" id="counter"></div>

    <div class="buttons" id="btnArea">
      <button class="btn-yes" onclick="sayYes()">Yes 💖</button>
      <button class="btn-no" id="noBtn">No</button>
    </div>

    <div class="success-msg" id="successMsg">
      Yayyyy!! I love you too!! 💕🎉
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    const noMessages = [
      "Are you sure? 🥺",
      "Pleaseee reconsider...",
      "That can't be right...",
      "Try again bestie 💀",
      "Wrong answer lol",
      "The button is shrinking...",
      "It's basically gone now 😭",
      "Just click Yes already",
      "I'm begging you 🙏",
    ];

    let noCount = 0;
    const noBtn = document.getElementById('noBtn');
    const counter = document.getElementById('counter');
    const yesBtn = document.querySelector('.btn-yes');

    document.addEventListener('click', () => {
      const audio = document.getElementById('bgMusic');
      if (audio.paused) audio.play().catch(() => {});
    }, { once: true });

    function moveNoButton() {
      const area = document.getElementById('btnArea');
      const rect = area.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      const maxX = Math.min(window.innerWidth - btnW - 20, 300);
      const maxY = Math.min(window.innerHeight - btnH - 20, 200);

      const randomX = (Math.random() - 0.5) * maxX;
      const randomY = (Math.random() - 0.5) * maxY;

      noBtn.style.left = randomX + 'px';
      noBtn.style.top  = randomY + 'px';

      noCount++;
      counter.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      const newSize = Math.max(0.6, 1.1 - noCount * 0.055);
      noBtn.style.fontSize = newSize + 'rem';
      noBtn.style.padding = `${0.75 * newSize}rem ${2 * newSize}rem`;

      if (noCount >= 10) {
        noBtn.style.display = 'none';
        counter.textContent = "The No button has left the chat 😂";
      }
    }

    noBtn.addEventListener('mouseover', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

    function sayYes() {
      document.getElementById('btnArea').style.display = 'none';
      counter.textContent = '';
      document.getElementById('successMsg').style.display = 'block';
      burstHearts();
    }

    function burstHearts() {
      for (let i = 0; i < 20; i++) {
        setTimeout(() => spawnMusicNote('❤️'), i * 80);
      }
    }

    function spawnMusicNote(emoji) {
      const el = document.createElement('div');
      el.className = 'music-note';
      el.textContent = emoji;
      el.style.left = (20 + Math.random() * 60) + 'vw';
      el.style.top  = (30 + Math.random() * 40) + 'vh';
      el.style.setProperty('--dx', (Math.random() - 0.5) * 80 + 'px');
      el.style.setProperty('--dr', (Math.random() - 0.5) * 40 + 'deg');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function createHearts() {
      const emojis = ['❤️', '💕', '💖', '💗', '💓', '🌸'];
      for (let i = 0; i < 18; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDuration = (6 + Math.random() * 8) + 's';
        h.style.animationDelay    = (Math.random() * 8) + 's';
        h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        document.getElementById('heartsContainer').appendChild(h);
      }
    }

    createHearts();
  </script>
</body>
</html>
