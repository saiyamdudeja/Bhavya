<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do You Love Me? 🥺</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff1f0, #ffd4c2, #ffb8a0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(233, 30, 99, 0.2);
      max-width: 460px;
      width: 90%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #e91e63;
      margin-bottom: 1.2rem;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .gif-container {
      margin: 0 auto 1.5rem;
      width: 220px;
      height: 220px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(233,30,99,0.25);
    }

    .gif-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .counter {
      font-size: 0.9rem;
      color: #f48fb1;
      margin-bottom: 1.2rem;
      min-height: 1.4em;
      font-style: italic;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 60px;
    }

    .btn-yes {
      background: #e91e63;
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(233,30,99,0.5);
    }

    .btn-no {
      background: white;
      color: #e91e63;
      border: 2px solid #e91e63;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      position: absolute;
      transition: font-size 0.2s;
      white-space: nowrap;
    }

    .success-msg {
      display: none;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #e91e63;
      margin-top: 1rem;
      animation: popIn 0.4s ease;
      line-height: 1.4;
    }

    #successLine1 {
      transition: opacity 0.3s ease;
      font-size: 1.5rem;
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .music-note {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: noteFloat 2s ease-out forwards;
      z-index: 10;
    }

    @keyframes noteFloat {
      0%   { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx), -80px) rotate(var(--dr)); }
    }

    /* PASSWORD GATE */
    #passwordGate {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fff1f0, #ffd4c2, #ffb8a0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Nunito', sans-serif;
    }

    #passwordGate h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #c0392b;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    #passwordGate p {
      color: #e07060;
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    #pwBox {
      background: rgba(255,255,255,0.85);
      border-radius: 1.5rem;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(233, 100, 80, 0.2);
      width: 90%;
      max-width: 360px;
    }

    #pwInput {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #ffb8a0;
      border-radius: 50px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      text-align: center;
      outline: none;
      margin-bottom: 1rem;
      background: white;
      color: #333;
      transition: border-color 0.2s;
    }

    #pwInput:focus { border-color: #e07060; }

    #pwInput.shake {
      animation: shake 0.4s ease;
      border-color: #e74c3c;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }

    #pwBtn {
      background: #e07060;
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      box-shadow: 0 4px 15px rgba(224, 112, 96, 0.4);
    }

    #pwBtn:hover { transform: scale(1.06); background: #c0392b; }

    #pwError {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 0.8rem;
      min-height: 1.2em;
      font-style: italic;
    }

    #passwordGate.fade-out {
      animation: gateOut 0.6s ease forwards;
    }

    @keyframes gateOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); pointer-events: none; }
    }
  </style>
</head>
<body>

  <div id="passwordGate">
    <div id="pwBox">
      <h2>🔒 who's there?</h2>
      <p>enter the password to continue 🌯</p>
      <input id="pwInput" type="password" placeholder="type here..." autocomplete="off" />
      <br/>
      <button id="pwBtn" onclick="checkPassword()">let me in 🫂</button>
      <div id="pwError"></div>
    </div>
  </div>


  <div class="hearts-bg" id="heartsContainer"></div>

    <div class="counter" id="counter"></div>

    <div class="buttons" id="btnArea">
      <button class="btn-yes" onclick="sayYes()">yes obv 😼❤️</button>
      <button class="btn-no" id="noBtn">no 😤</button>
    </div>

    <div class="success-msg" id="successMsg">
      <div id="successLine1"></div>
    </div>
  </div>

  <iframe id="scPlayer" 
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/officialspedupmusic/until-i-found-you-sped-up&color=%23e07060&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"
    style="display:none;" allow="autoplay">
  </iframe>

  <script>
    const noMessages = [
      "billo NO 😤",
      "ur literally my burrito how 🌯😤",
      "the audacity of this cat 😼",
      "I will unwrap u 🌯😤",
      "billo pls 🫂😿",
      "this is not giving 😎",
      "the button is getting smaller like ur excuse 😤",
      "ur being so unserious rn 😼",
      "BILLO. 😤🐈",
    ];

    let noCount = 0;
    const noBtn = document.getElementById('noBtn');
    const counter = document.getElementById('counter');

    // SoundCloud player handles autoplay via iframe

    function moveNoButton() {
      const maxX = Math.min(window.innerWidth - noBtn.offsetWidth - 20, 300);
      const maxY = Math.min(window.innerHeight - noBtn.offsetHeight - 20, 200);

      const randomX = (Math.random() - 0.5) * maxX;
      const randomY = (Math.random() - 0.5) * maxY;

      noBtn.style.left = randomX + 'px';
      noBtn.style.top  = randomY + 'px';

      noCount++;
      counter.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      const newSize = Math.max(0.6, 1.1 - noCount * 0.055);
      noBtn.style.fontSize = newSize + 'rem';
      noBtn.style.padding = `${0.75 * newSize}rem ${2 * newSize}rem`;

      if (noCount >= 10) {
        noBtn.style.display = 'none';
        counter.textContent = "ok fine. but u still my burrito 🌯😤❤️";
      }
    }

    noBtn.addEventListener('mouseover', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

    const successLines = [
      "I knew it 😼",
      "I love you too 👩🏻‍❤️‍💋‍👨🏻",
      "time to burrito 😼🌯",
    ];

    function sayYes() {
      document.getElementById('btnArea').style.display = 'none';
      counter.textContent = '';
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      const line = document.getElementById('successLine1');
      let idx = 0;
      line.textContent = successLines[0];
      burstHearts();
      setInterval(() => {
        idx = (idx + 1) % successLines.length;
        line.style.opacity = '0';
        setTimeout(() => {
          line.textContent = successLines[idx];
          line.style.opacity = '1';
          spawnEmoji(['🌯','😼','🫂','❤️','🐈','😎'][Math.floor(Math.random()*6)]);
        }, 300);
      }, 1800);
    }

    function burstHearts() {
      for (let i = 0; i < 20; i++) {
        setTimeout(() => spawnEmoji(['❤️','🌯','😼','🫂','💕','😎','🐈'][Math.floor(Math.random()*7)]), i * 80);
      }
    }

    function spawnEmoji(emoji) {
      const el = document.createElement('div');
      el.className = 'music-note';
      el.textContent = emoji;
      el.style.left = (20 + Math.random() * 60) + 'vw';
      el.style.top  = (30 + Math.random() * 40) + 'vh';
      el.style.setProperty('--dx', (Math.random() - 0.5) * 80 + 'px');
      el.style.setProperty('--dr', (Math.random() - 0.5) * 40 + 'deg');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function createHearts() {
      const emojis = ['❤️', '💕', '🌯', '💖', '😼', '🌸', '🫂'];
      for (let i = 0; i < 18; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDuration = (6 + Math.random() * 8) + 's';
        h.style.animationDelay    = (Math.random() * 8) + 's';
        h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        document.getElementById('heartsContainer').appendChild(h);
      }
    }

    createHearts();

    function checkPassword() {
      const input = document.getElementById('pwInput').value.trim();
      const error = document.getElementById('pwError');
      const gate  = document.getElementById('passwordGate');

      if (input.toLowerCase() === 'mere kabir') {
        gate.classList.add('fade-out');
        setTimeout(() => gate.remove(), 650);
      } else {
        const el = document.getElementById('pwInput');
        el.classList.remove('shake');
        void el.offsetWidth; // reflow to restart animation
        el.classList.add('shake');
        const wrongMsgs = [
          "nope 😤 try again",
          "who are you?? 😼",
          "that's not it bestie 🙀",
          "WRONG 😤",
        ];
        error.textContent = wrongMsgs[Math.floor(Math.random() * wrongMsgs.length)];
        setTimeout(() => el.classList.remove('shake'), 400);
      }
    }

    document.getElementById('pwInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
